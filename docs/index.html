<body>

  <nav class="navbar navbar-light bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#" id="header">
        <img src="/docs/Assets/img/sh2.jpg" alt="" width="30" height="24" class="d-inline-block align-text-top">
        SuperHero
      </a>
    </div>
  </nav>
<div class="container">
  <img id="foto1" class="mx-auto d-block" src="/docs/Assets/img/sh2.jpg" alt="">

  <div class="mb-3">
    <label for="id" class="mb-2">Ingrese el numero del SuperHeroe a buscar </label>
    <input type="number" class="form-control mb-2" min="1" max="1000" id="id">

  <div class="tarjeta">

    <div class="row g-0">
      <div class="col-md-4">
        <img src="" id="foto2" class="img-fluid rounded-start" alt="...">
      </div>
      <div class="col-md-8">
        <div class="card-body">
          <h5 class="card-title"></h5> 
          <p class="card-text" id="conexiones"></p>
          <p class="card-text" id="publicado"></p>
          <p class="card-text" id="ocupacion"></p>
          <p class="card-text" id="aparicion"></p>
          <p class="card-text" id="altura"></p>
          <p class="card-text" id="peso"></p>
          <p class="card-text" id="alianza"></p>
        </div>
      </div>
    </div>
  </div>
</div>


  <script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
